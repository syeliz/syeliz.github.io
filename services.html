<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Uygulama Ödevi</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="wrapper">
        <nav class="navbar">
            <div class="logo">LOGO</div>
            <ul class="nav-links">
                <li><a href="#">Ana Sayfa</a></li>
                <li><a href="#">Hakkında</a></li>
                <li><a href="#">Dersler</a></li>
                <li><a href="#">İletişim</a></li>
            </ul>
        </nav>

        <section class="hero">
            <div class="hero-content">
                <h1>Hero Başlık</h1>
                <p>Açıklama metni buraya gelecek.</p>
                <button>Buton</button>
            </div>
            <div class="hero-image">Görsel Kutusu</div>
        </section>

        <section class="cards-section">
            <div class="card">Kart 1</div>
            <div class="card">Kart 2</div>
            <div class="card) Kart 3">Kart 3</div>
            <div class="card">Kart 4</div>
            <div class="card">Kart 5</div>
            <div class="card">Kart 6</div>
        </section>

        <section class="flex-grow-section">
            <div class="box box1">1 Kutu (flex-grow: 1)</div>
            <div class="box box2">2 Kutu (flex-grow: 2)</div>
            <div class="box box3">3 Kutu (flex-grow: 1)</div>
        </section>

        <footer class="footer">
            <p>© 2026 - Temel Flexbox Örneği</p>
        </footer>
    </div>
</body>
</html>
