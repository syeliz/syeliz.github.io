<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim Formu</title>
    <style>        
        .contact-container {
            width: 600px;
            margin: 40px auto;
            
            padding: 25px;
            border: 2px solid #ccc;
            border-radius: 12px;
            
            font-family: sans-serif;
            background-color: #ffffff;
        }

        .contact-container h2 {
            text-align: center;
            color: #333;
        }

        .contact-container label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"], 
        input[type="email"], 
        select, 
        textarea {
            width: 100%; 
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .submit-btn {
            background-color: #007bff; 
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <h2>Detaylı İletişim Formu</h2>
        
        <form action="#" method="post">
            <label for="ad-soyad">Ad Soyad:</label>
            <input type="text" id="ad-soyad" name="ad-soyad" placeholder="Örn: John Doe" required>

            <label for="email">E-posta Adresi:</label>
            <input type="email" id="email" name="email" placeholder="ornek@mail.com" required>

            <label for="konu">Konu:</label>
            <select id="konu" name="konu" required>
                <option value="" disabled selected>Lütfen bir konu seçin...</option>
                <option value="is-teklifi">İş Teklifi</option>
                <option value="soru">Soru</option>
                <option value="geri-bildirim">Geri Bildirim</option>
            </select>

            <label for="mesaj">Mesajınız:</label>
            <textarea id="mesaj" name="mesaj" rows="4" placeholder="Detaylı mesajınızı buraya yazabilirsiniz..."></textarea>

            <button type="submit" class="submit-btn">Gönder</button>
        </form>
    </div>

</body>
</html>
